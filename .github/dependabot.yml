# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "pip" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    # Renovate owns routine version updates for this repo. Keep Dependabot
    # configured but disabled for version-update PRs so GitHub security updates
    # can remain enabled without competing lockfile branches.
    open-pull-requests-limit: 0
    assignees:
      - "basher83"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    labels:
      - "dependencies"
      - "area:python"
    ignore:
      # pip-audit >=2.10.0 currently conflicts with semgrep's tomli constraint
      # under this resolver/index setup. Revisit as a dedicated tooling cleanup.
      - dependency-name: "pip-audit"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"
